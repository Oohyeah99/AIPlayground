<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Playground - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0f;
      color: #e0e0e8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-card {
      background: #13131a;
      border: 1px solid #2a2a3a;
      border-radius: 12px;
      padding: 40px;
      width: 360px;
      text-align: center;
    }
    .login-card h1 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .login-card p {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 24px;
    }
    .login-card input {
      width: 100%;
      padding: 10px 14px;
      background: #1a1a25;
      border: 1px solid #2a2a3a;
      border-radius: 8px;
      color: #e0e0e8;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      margin-bottom: 16px;
    }
    .login-card input:focus {
      border-color: #6366f1;
    }
    .login-card button {
      width: 100%;
      padding: 10px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
    }
    .login-card button:hover { background: #5558e6; }
    .login-card button:disabled { opacity: 0.5; cursor: not-allowed; }
    .error {
      color: #ef4444;
      font-size: 0.85rem;
      margin-top: 12px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>AI Playground</h1>
    <p>Enter the admin password to continue</p>
    <form id="login-form">
      <input type="password" id="password" placeholder="Password" autofocus autocomplete="current-password">
      <button type="submit">Sign In</button>
    </form>
    <div class="error" id="error">Incorrect password</div>
  </div>
  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      const pw = document.getElementById('password').value;
      const errEl = document.getElementById('error');
      errEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Signing in...';
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pw }),
        });
        if (res.ok) {
          window.location.href = '/';
        } else {
          errEl.style.display = 'block';
        }
      } catch {
        errEl.textContent = 'Connection error';
        errEl.style.display = 'block';
      }
      btn.disabled = false;
      btn.textContent = 'Sign In';
    });
  </script>
</body>
</html>
